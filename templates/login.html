{% extends 'base.html' %}
{% block title %}Login – VirtualQ{% endblock %}

{% block extra_head %}
<style>
    .auth-wrap {
        min-height: calc(100vh - var(--nav-h) - 200px);
        display: flex;
        align-items: center;
        padding: 48px 0;
    }
    .auth-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        max-width: 440px;
        width: 100%;
        margin: 0 auto;
    }
    .auth-header {
        padding: 36px 36px 0;
    }
    .auth-header .section-tag { margin-bottom: 10px; }
    .auth-title {
        font-family: 'Syne', sans-serif;
        font-size: 1.75rem;
        font-weight: 800;
        letter-spacing: -0.5px;
        margin-bottom: 4px;
    }
    .auth-sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 0; }
    .auth-body { padding: 28px 36px 36px; }
    .form-label { font-weight: 600; font-size: 0.85rem; margin-bottom: 6px; }
    .auth-footer-link {
        background: #fafaf8;
        border-top: 1px solid var(--border);
        padding: 16px 36px;
        text-align: center;
        font-size: 0.87rem;
        color: var(--muted);
    }
    .auth-footer-link a {
        color: var(--accent2);
        font-weight: 600;
        text-decoration: none;
    }
    .auth-footer-link a:hover { text-decoration: underline; }
    .input-icon-wrap { position: relative; }
    .input-icon-wrap .bi {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        font-size: 0.95rem;
    }
    .input-icon-wrap .form-control { padding-left: 36px; }
    .btn-submit {
        background: var(--ink);
        color: var(--white);
        border: none;
        width: 100%;
        padding: 12px;
        font-family: 'Syne', sans-serif;
        font-weight: 700;
        font-size: 0.9rem;
        letter-spacing: 0.5px;
        border-radius: var(--radius-sm);
        transition: background 0.2s;
    }
    .btn-submit:hover { background: #222230; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="w-100">
        <div class="auth-card shadow-sm">
            <div class="auth-header">
                <div class="section-tag">Welcome back</div>
                <h2 class="auth-title">Sign in</h2>
                <p class="auth-sub">Access your dashboard and track applications.</p>
            </div>
            <div class="auth-body">
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <div class="input-icon-wrap">
                            <i class="bi bi-envelope"></i>
                            <input type="email" class="form-control" id="email" name="email"
                                   required placeholder="you@example.com">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-icon-wrap">
                            <i class="bi bi-lock"></i>
                            <input type="password" class="form-control" id="password" name="password"
                                   required placeholder="Your password">
                        </div>
                    </div>
                    <button type="submit" class="btn-submit">
                        Sign in <i class="bi bi-arrow-right ms-1"></i>
                    </button>
                </form>
            </div>
            <div class="auth-footer-link">
                Don't have an account? <a href="{{ url_for('register') }}">Register free</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
